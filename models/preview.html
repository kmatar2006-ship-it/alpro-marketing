<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alpro Frozen Yoghurt 500ml Preview</title>
<style>
  html, body { margin:0; height:100%; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:#f6fbf4; color:#073b25; }
  .label { position:fixed; left:24px; top:24px; z-index:3; background:rgba(255,255,255,.78); backdrop-filter:blur(10px); border:1px solid #d8e8de; border-radius:999px; padding:9px 14px; font-weight:800; }
  canvas { display:block; width:100vw; height:100vh; }
</style>
</head>
<body>
<div class="label">Alpro Frozen Yoghurt 500ml</div>
<canvas id="canvas"></canvas>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.161.0/build/three.module.js';
import { GLTFLoader } from 'https://unpkg.com/three@0.161.0/examples/jsm/loaders/GLTFLoader.js';
import { OrbitControls } from 'https://unpkg.com/three@0.161.0/examples/jsm/controls/OrbitControls.js';

const canvas = document.getElementById('canvas');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, -4.2, 1.25);

const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.25;

scene.add(new THREE.HemisphereLight(0xffffff, 0xf5ead8, 2.8));
const key = new THREE.DirectionalLight(0xffffff, 3.0);
key.position.set(3, -5, 4);
scene.add(key);
const fill = new THREE.DirectionalLight(0xffffff, 1.4);
fill.position.set(-4, 2, 3);
scene.add(fill);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 0, 0.05);

let model;
new GLTFLoader().load('./assets/model/alpro_frozen_yoghurt_500ml_final_fixed.glb', (gltf) => {
  model = gltf.scene;
  model.scale.setScalar(1.15);
  model.rotation.x = -Math.PI / 2;
  scene.add(model);
});

function resize() {
  renderer.setSize(window.innerWidth, window.innerHeight, false);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

function animate(t) {
  if (model) model.rotation.z = Math.sin(t * 0.0005) * 0.08;
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
